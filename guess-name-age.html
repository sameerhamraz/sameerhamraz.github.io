<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="UTF-8">
  <title>حدس زدن اسم و سن | Sameer</title>
  <style>
    body {
      font-family: sans-serif;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(to bottom, #ffecd2, #fcb69f);
      text-align: center;
      padding: 20px;
    }
    h2 { font-size: 2em; margin-bottom: 20px; }
    input {
      padding: 15px;
      font-size: 1.5em;
      border-radius: 25px;
      border: 1px solid #ccc;
      margin: 5px;
      width: 250px;
      text-align: center;
    }
    button {
      padding: 15px 30px;
      font-size: 1.5em;
      border-radius: 25px;
      border: none;
      background-color: #ff5252;
      color: white;
      cursor: pointer;
      margin-top: 10px;
      transition: 0.3s;
    }
    button:hover { opacity: 0.8; }
    #result {
      margin-top: 30px;
      font-size: 1.8em;
      font-weight: bold;
      color: #2196f3;
    }
  </style>
</head>
<body>

  <h2>سلام! من می‌توانم اسم و سن شما را حدس بزنم 😎</h2>
  <p>لطفاً اسم و سن خود را وارد کنید:</p>
  
  <input type="text" id="name" placeholder="اسم شما">
  <input type="number" id="age" placeholder="سن شما">
  <br>
  <button onclick="guess()">حدس بزن!</button>

  <p id="result"></p>

  <script>
    function guess() {
      const name = document.getElementById("name").value.trim();
      const age = document.getElementById("age").value.trim();

      if (!name || !age) {
        alert("لطفاً هر دو فیلد را پر کنید!");
        return;
      }

      const resultText = `سلام! من می‌فهمم که اسم تو ${name} است و سن تو ${age} سال است. و بسیار یک آدم پوک هستی 😜`;
      document.getElementById("result").textContent = resultText;
    }
  </script>

</body>
</html>
