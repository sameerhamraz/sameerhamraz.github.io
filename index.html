<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>3D Hand Galaxy Control</title>
  <style>
    body { margin: 0; overflow: hidden; background: black; }
    video { display: none; }
  </style>
</head>
<body>

<video id="video" autoplay playsinline></video>

<script src="https://unpkg.com/three@0.158.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<script>
/* ---------- THREE SETUP ---------- */
const scene = new THREE.Scene();

const camera3D = new THREE.PerspectiveCamera(75, innerWidth / innerHeight, 0.1, 1000);
camera3D.position.z = 6;

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
document.body.appendChild(renderer.domElement);

// Cube
const cube = new THREE.Mesh(
  new THREE.BoxGeometry(),
  new THREE.MeshNormalMaterial()
);
scene.add(cube);

// Light
scene.add(new THREE.AmbientLight(0xffffff, 1));

/* ---------- GALAXY ---------- */
let galaxy;
const galaxyCount = 2000;

function createGalaxy() {
  const geometry = new THREE.BufferGeometry();
  const positions = [];

  for (let i = 0; i < galaxyCount; i++) {
    const radius = Math.random() * 5;
    const angle = Math.random() * Math.PI * 2;
    const height = (Math.random() - 0.5) * 0.5;

    positions.push(
      Math.cos(angle) * radius,
      height,
      Math.sin(angle) * radius
    );
  }

  geometry.setAttribute(
    "position",
    new THREE.Float32BufferAttribute(positions, 3)
  );

  const material = new THREE.PointsMaterial({
    color: 0xffffff,
    size: 0.03
  });

  galaxy = new THREE.Points(geometry, material);
  scene.add(galaxy);
  galaxy.visible = false;
}

createGalaxy();

/* ---------- HAND TRACKING ---------- */
const video = document.getElementById("video");

const hands = new Hands({
  locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
});

hands.setOptions({
  maxNumHands: 1,
  minDetectionConfidence: 0.7,
  minTrackingConfidence: 0.7
});

let isFist = false;

hands.onResults(results => {
  if (!results.multiHandLandmarks.length) return;

  const lm = results.multiHandLandmarks[0];

  const palm = lm[0];
  const tips = [lm[8], lm[12], lm[16], lm[20]];

  let fistScore = 0;
  tips.forEach(tip => {
    const dx = tip.x - palm.x;
    const dy = tip.y - palm.y;
    fistScore += Math.sqrt(dx * dx + dy * dy);
  });

  isFist = fistScore < 0.6;

  if (!isFist) {
    cube.position.x = (lm[8].x - 0.5) * 6;
    cube.position.y = -(lm[8].y - 0.5) * 4;
  }
});

const cam = new Camera(video, {
  onFrame: async () => await hands.send({ image: video }),
  width: 640,
  height: 480
});
cam.start();

/* ---------- LOOP ---------- */
function animate() {
  requestAnimationFrame(animate);

  cube.rotation.x += 0.01;
  cube.rotation.y += 0.01;

  galaxy.visible = isFist;
  if (isFist) {
    galaxy.rotation.y += 0.002;
    galaxy.rotation.x += 0.001;
  }

  renderer.render(scene, camera3D);
}
animate();

window.addEventListener("resize", () => {
  camera3D.aspect = innerWidth / innerHeight;
  camera3D.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});
</script>
</body>
</html>
