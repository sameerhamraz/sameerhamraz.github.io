<section id="game">
  <h2>بازی سنگ – کاغذ – قیچی ✊ ✋ ✌️</h2>
  <div class="rps">
    <button onclick="play('سنگ')">✊ سنگ</button>
    <button onclick="play('کاغذ')">✋ کاغذ</button>
    <button onclick="play('قیچی')">✌️ قیچی</button>
  </div>
  <p id="result">یک گزینه انتخاب کن...</p>
</section>

<script>
  function play(userChoice) {
    const choices = ["سنگ", "کاغذ", "قیچی"];
    const computerChoice = choices[Math.floor(Math.random() * 3)];
    let result = "";

    if (userChoice === computerChoice) {
      result = "مساوی شد! 😅";
    } else if (
      (userChoice === "سنگ" && computerChoice === "قیچی") ||
      (userChoice === "کاغذ" && computerChoice === "سنگ") ||
      (userChoice === "قیچی" && computerChoice === "کاغذ")
    ) {
      result = `تو بردی! 🎉 (${userChoice} در برابر ${computerChoice})`;
    } else {
      result = `کامپیوتر برد 😈 (${computerChoice} در برابر ${userChoice})`;
    }

    document.getElementById("result").textContent = result;
  }
</script>
