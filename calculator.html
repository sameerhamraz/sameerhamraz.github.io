<section id="calculator" style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center;">
  <h2>ماشین حساب 🧮</h2>
  <input type="text" id="display" readonly style="width: 300px; height: 50px; font-size: 2em; text-align: right; margin-bottom: 20px; border-radius: 12px; padding: 5px;">
  <div class="buttons" style="display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px;">
    <button onclick="clearDisplay()" style="padding: 20px; font-size: 1.5em; border-radius: 25px; background-color:#ff5252; color:white;">C</button>
    <button onclick="appendValue('/')" style="padding: 20px; font-size: 1.5em; border-radius: 25px; background-color:#4caf50; color:white;">÷</button>
    <button onclick="appendValue('*')" style="padding: 20px; font-size: 1.5em; border-radius: 25px; background-color:#2196f3; color:white;">×</button>
    <button onclick="appendValue('-')" style="padding: 20px; font-size: 1.5em; border-radius: 25px; background-color:#ff9800; color:white;">−</button>
    
    <button onclick="appendValue('7')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">7</button>
    <button onclick="appendValue('8')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">8</button>
    <button onclick="appendValue('9')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">9</button>
    <button onclick="appendValue('+')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">+</button>

    <button onclick="appendValue('4')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">4</button>
    <button onclick="appendValue('5')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">5</button>
    <button onclick="appendValue('6')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">6</button>
    <button onclick="calculate()" style="padding: 20px; font-size: 1.5em; border-radius: 25px; background-color:#607d8b; color:white;">=</button>

    <button onclick="appendValue('1')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">1</button>
    <button onclick="appendValue('2')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">2</button>
    <button onclick="appendValue('3')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">3</button>
    <button onclick="appendValue('0')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">0</button>

    <button onclick="appendValue('.')" style="padding: 20px; font-size: 1.5em; border-radius: 25px;">.</button>
  </div>
</section>

<script>
  const display = document.getElementById("display");
  function appendValue(value){ display.value += value; }
  function clearDisplay(){ display.value = ""; }
  function calculate(){ try{ display.value = eval(display.value); }catch{ display.value="خطا"; } }
</script>
